<!DOCTYPE html>

<html>
    <head>
        <title>Activity 4</title>
    </head>

    <body>
        <h2>User Information Form</h2>
        <body style="background: url('images/ponyo.jpg'); background-repeat: no-repeat;background-size: auto;"></body>
        <form action="" method="post">
            <label for="frame">First Name:</label><br>
            <input type="text" id="fname" name="firstname" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lastname" required><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age"><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="male">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="male">Other</label><br><br>

            <label>Hobbies:</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="reading">
            <label for="hobby1">Reading</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="traveling">
            <label for="hobby2">Traveling</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="gaming">
            <label for="hobby3">Gaming</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="cooking">
            <label for="hobby4">Cooking</label><br>
            <input type="checkbox" id="hobby5" name="hobby" value="sports">
            <label for="hobby5">Sports</label><br><br>

            <label for="year-level">Year Level:</label><br><br>
            <select id="year-level" name="year-level">
                <option value="1st-year">1st Year</option>
                <option value="2st-year">2nd Year</option>
                <option value="3st-year">3rd Year</option>
                <option value="4st-year">4th Year</option>
            </select><br><br>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>



        </form>


    </body>



</html>
